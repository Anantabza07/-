html<!DOCTYPE >
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จะบรรลุหรือจะบรรลัย | กำลังเล่น</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="game-body-page">

<!-- Cave atmosphere -->
<div class="cave-bg">
  <div class="cave-stalactites" id="stalactites"></div>
  <div class="lava-river"></div>
  <div class="embers" id="embers"></div>
</div>

<!-- ===== MAIN GAME SCREEN ===== -->
<section id="screen-game" class="screen active">

  <!-- Header -->
  <header class="game-header">
    <div class="header-left">
      <button id="btn-back-home" class="btn-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        <span>หน้าหลัก</span>
      </button>
    </div>
    <div class="header-center">
      <p class="eyebrow" id="difficulty-label">🔥 ปานกลาง</p>
      <h2 id="round-label">รอบที่ 1</h2>
    </div>
    <div class="header-right">
      <div id="puzzle-cell-badge" class="puzzle-cell-badge">📜 <span id="puzzle-cell-count">10</span> ช่องทอง</div>
      <button id="btn-stop-game" class="btn-stop">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        <span>หยุดเกม</span>
      </button>
    </div>
  </header>

  <!-- Board + Scoreboard -->
  <div class="game-body">
    <aside class="scoreboard" id="scoreboard"></aside>
    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
  </div>

  <!-- ===== QUESTION DRAWER (bottom panel, board stays visible) ===== -->
  <div id="question-drawer" class="question-drawer">
    <div class="drawer-inner">

      <!-- Normal round question -->
      <div id="qpanel-normal" class="qpanel active">
        <div class="qpanel-top">
          <div class="qpanel-left">
            <span class="difficulty-pill" id="math-difficulty">ปานกลาง</span>
            <span class="my-pos-inline">📍 ช่อง <strong id="my-pos-num">0</strong></span>
          </div>
          <span class="math-deadline" id="math-deadline">30s</span>
          <button class="drawer-exit-btn" id="btn-exit-q">🏠</button>
        </div>
        <div class="math-expression" id="math-expression">?</div>
        <div class="choices-grid" id="choices-grid"></div>
        <div class="race-strip" id="math-race-list"></div>
      </div>

      <!-- Golden cell question (จะบรรลุหรือจะบรรลัย) -->
      <div id="qpanel-gold" class="qpanel">
        <div class="qpanel-top gold-top">
          <span class="gold-eyebrow" id="gold-eyebrow">⭐ จะบรรลุหรือจะบรรลัย</span>
          <span class="math-deadline" id="gold-deadline">30s</span>
          <button class="drawer-exit-btn" id="btn-exit-gold">🏠</button>
        </div>
        <p class="gold-flavor" id="gold-flavor">ตอบถูก = เดินหน้า | ตอบผิด = ถอยหลัง</p>
        <div class="math-expression gold-expr" id="gold-expression">?</div>
        <div class="choices-grid" id="gold-choices-grid"></div>
        <div class="race-strip" id="gold-race-list"></div>
      </div>

    </div>
  </div>

</section>

<!-- ===== SUCCESS BURST (ไอคอนสำเร็จ) ===== -->
<div id="success-burst" class="success-burst">
  <div class="burst-icon" id="burst-icon">✅</div>
  <div class="burst-text" id="burst-text">สำเร็จ!</div>
</div>

<!-- ===== WALK CUTSCENE ===== -->
<div id="cutscene-walk" class="cutscene-walk">
  <div class="cutscene-inner">
    <div class="cutscene-track" id="cutscene-track">
      <!-- cells generated by JS -->
    </div>
    <div class="cutscene-avatar" id="cutscene-avatar">🧑</div>
    <p class="cutscene-caption" id="cutscene-caption">กำลังเดินไป...</p>
  </div>
</div>

<!-- ===== PUZZLE RESULT CARD ===== -->
<div id="puzzle-result-overlay" class="puzzle-result-overlay">
  <div class="puzzle-result-card" id="puzzle-result-card">
    <div class="prc-icon" id="prc-icon">⭐</div>
    <h2 class="prc-title" id="prc-title">บรรลุ!</h2>
    <p class="prc-sub" id="prc-sub">เดินหน้า 3 ช่อง</p>
  </div>
</div>

<!-- ===== CONFIRM DIALOG ===== -->
<div id="modal-confirm" class="modal-overlay" style="z-index:300">
  <div class="modal-card confirm-card">
    <h2 id="confirm-title">ยืนยัน</h2>
    <p id="confirm-msg"></p>
    <div class="confirm-btns">
      <button id="confirm-cancel" class="btn-outline">ยกเลิก</button>
      <button id="confirm-ok" class="btn-primary">ยืนยัน</button>
    </div>
  </div>
</div>

<!-- ===== WIN MODAL ===== -->
<div id="modal-win" class="modal-overlay">
  <div class="modal-card win-card">
    <div class="win-fireworks">💎🏆💎</div>
    <p class="win-eyebrow">รอดแล้ว!!</p>
    <h2 id="win-name">ผู้เล่น 1 รอดชีวิต!</h2>
    <p id="win-sub">หนีออกจากถ้ำได้เป็นคนแรก</p>
    <div id="win-rank-list" class="win-rank-list"></div>
    <div class="win-btns">
      <button id="btn-play-again" class="btn-primary">🏃 เล่นอีกรอบ</button>
      <button id="btn-home-from-win" class="btn-outline">🏠 กลับหน้าหลัก</button>
    </div>
  </div>
</div>

<!-- Lava flash -->
<div id="lava-flash" class="lava-flash"></div>

<script src="game.js"></script>
</body>
</html>
